name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '**.txt'
      - '**.rst'
      - '**.adoc'
      - 'docs/**'
      - '.github/*.md'
      - 'LICENSE'
      - '.gitignore'

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle build cache
        uses: actions/cache@v5
        with:
          path: ~/.gradle/caches/build-cache-*
          key: gradle-build-cache-${{ hashFiles('**/*.kt', '**/*.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-build-cache-

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/hr-beep-release.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/hr-beep-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon -x lintVitalRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: hr-beep-release-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
